project:
  name: ashare_multifactor
  data_dir: data
  output_dir: outputs

universe:
  index_symbol: "000300"
  symbols: ["000001", "000002", "600000", "600519", "000858", "300750"]
  start_date: "2021-01-01"
  end_date: "2024-12-31"

data:
  adjust: "qfq"
  cache: true
  demo_if_akshare_fails: true

factors:
  winsorize_limits: [0.01, 0.99]
  neutralize:
    industry: true
    market_cap: true
  names:
    - momentum_20
    - reversal_5
    - volatility_20
    - liquidity_20
    - value_ep
    - quality_roe

portfolio:
  method: "ic_weighted"
  rebalance: "M"
  top_n: 20
  max_weight: 0.1
  fee_rate: 0.0003
  slippage: 0.0005

analysis:
  quantiles: 5
  forward_return_days: 20
  rolling_window: 252
